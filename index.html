<title>Heavy Bag Lab â Muay Thai</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html,body{overscroll-behavior:none;touch-action:pan-y}
  body{background:#0a0a0a;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .header{text-align:center;padding:32px 20px 16px;border-bottom:2px solid #dc2626;background:linear-gradient(180deg,rgba(220,38,38,.15) 0%,transparent 100%)}
  .title{font-size:clamp(1.8rem,5vw,2.4rem);font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#fff;text-shadow:0 0 30px rgba(220,38,38,.5)}
  .subtitle{font-size:.85rem;color:#888;letter-spacing:.3em;text-transform:uppercase;margin-top:6px}
  .phase-label{width:100%;text-align:center;padding:12px 8px;font-size:.8rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;border-bottom:1px solid rgba(220,38,38,.2)}
  .week-tabs{display:flex;justify-content:center;gap:6px;padding:16px 8px;flex-wrap:wrap}
  .week-tab{padding:10px 16px;border-radius:8px;border:2px solid #333;background:transparent;color:#888;font-weight:700;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;min-height:44px}
  .week-tab.active{color:#fff}
  .session-card{margin:12px 16px;padding:20px;background:linear-gradient(135deg,#1a1a1a 0%,#111 100%);border:1px solid #2a2a2a;border-radius:12px;cursor:pointer;transition:all .15s;border-left:4px solid #dc2626;-webkit-user-select:none;user-select:none}
  .session-card:active{transform:scale(.98);opacity:.9}
  .session-name{font-size:1.15rem;font-weight:800;color:#fff;letter-spacing:.05em}
  .session-desc{font-size:.85rem;color:#999;margin-top:6px;line-height:1.4}
  .session-meta{display:flex;gap:10px;margin-top:12px;font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:.1em;font-weight:600;flex-wrap:wrap}
  .meta-badge{padding:4px 10px;background:#222;border-radius:4px;border:1px solid #333}
  .timer-area{text-align:center;padding:24px 20px 16px}
  .round-label{font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
  .status-label{font-size:.9rem;color:#888;font-weight:600;letter-spacing:.05em}
  .timer-display{font-size:clamp(4rem,15vw,7rem);font-weight:900;font-variant-numeric:tabular-nums;line-height:1;margin:8px 0;letter-spacing:-.02em}
  .timer-notes{font-size:.82rem;color:#888;margin:0 auto;max-width:420px;text-align:center;font-style:italic;line-height:1.5;padding:0 12px}
  .progress-bar{height:6px;background:#222;border-radius:3px;margin:12px 20px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .controls{display:flex;justify-content:center;gap:12px;padding:16px 20px;flex-wrap:wrap}
  .btn{padding:12px 24px;border-radius:10px;border:none;font-weight:800;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;color:#fff;min-height:48px;min-width:48px}
  .btn:active{transform:scale(.95)}
  .btn-primary{padding:16px 44px;font-size:1.05rem}
  .btn-start{background:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.4)}
  .btn-pause{background:#dc2626;box-shadow:0 0 20px rgba(220,38,38,.4)}
  .btn-secondary{background:#222;border:1px solid #333}
  .btn-done{background:#22c55e;padding:16px 44px;font-size:1.05rem;box-shadow:0 0 20px rgba(34,197,94,.4)}
  .round-list{padding:8px 16px 20px}
  .round-list-title{font-size:.75rem;font-weight:700;color:#666;letter-spacing:.15em;text-transform:uppercase;padding:8px 4px;margin-bottom:4px}
  .round-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;margin:4px 0;border-radius:10px;background:#111;border:1px solid #1a1a1a;transition:all .3s}
  .round-item.active{border-width:2px}
  .round-item.done{opacity:.4}
  .round-item.upcoming{opacity:.6}
  .round-type{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.15em;padding:3px 8px;border-radius:4px;margin-right:10px;white-space:nowrap}
  .round-type.warmup{background:rgba(34,211,238,.13);color:#22d3ee}
  .round-type.cooldown{background:rgba(167,139,250,.13);color:#a78bfa}
  .round-type.work{background:rgba(220,38,38,.13);color:#dc2626}
  .round-name{font-weight:700;font-size:.85rem}
  .round-detail{font-size:.75rem;color:#888;margin-top:3px;line-height:1.4}
  .round-time{font-variant-numeric:tabular-nums;font-size:.85rem;font-weight:600;color:#666;white-space:nowrap}
  .round-rest-badge{color:#f59e0b;margin-left:8px;font-size:.72rem}
  .ref-section{margin:16px;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden}
  .ref-header{padding:16px 20px;background:#151515;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:#999;border:none;width:100%;min-height:48px}
  .ref-item{padding:14px 20px;border-top:1px solid #1a1a1a}
  .ref-name{font-weight:700;color:#dc2626;font-size:.9rem}
  .ref-desc{color:#888;font-size:.82rem;line-height:1.5;margin-top:4px}
  .back-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;margin:12px 16px;background:transparent;border:1px solid #333;border-radius:8px;color:#999;font-weight:600;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;min-height:44px}
  .session-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 8px 0;border-bottom:1px solid #1a1a1a}
  .session-header-label{font-size:.78rem;color:#666;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding-right:16px}
  .complete-msg{font-size:1.5rem;font-weight:900;color:#22c55e;letter-spacing:.1em;text-transform:uppercase;margin-top:10px;text-shadow:0 0 30px rgba(34,197,94,.4)}
  .complete-icon{font-size:4rem;color:#22c55e;text-shadow:0 0 40px rgba(34,197,94,.4);line-height:1;margin:10px 0}
  .footer{text-align:center;padding:24px 20px;font-size:.7rem;color:#333;letter-spacing:.1em}
  .chevron{font-size:1.2rem;transition:transform .2s;display:inline-block}
  .chevron.open{transform:rotate(180deg)}

  /* BIG TIMER MODE â when running */
  .timer-big .timer-display{font-size:clamp(6rem,28vw,14rem)!important;margin:16px 0!important}
  .timer-big .round-label{font-size:clamp(1.4rem,4vw,2rem)!important;margin-bottom:8px}
  .timer-big .status-label{font-size:clamp(1rem,2.5vw,1.3rem)!important}
  .timer-big .timer-notes{font-size:clamp(.9rem,2vw,1.1rem)!important;max-width:600px}

  /* 10 second warning flash */
  @keyframes warningPulse{0%{opacity:1}50%{opacity:.6}100%{opacity:1}}
  .timer-warning .timer-display{animation:warningPulse .5s ease-in-out infinite;color:#ef4444!important;text-shadow:0 0 60px rgba(239,68,68,.7)!important}

  /* YouTube tutorial button */
  .yt-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#dc2626;color:#fff;border:none;border-radius:6px;font-size:.78rem;font-weight:700;letter-spacing:.05em;text-decoration:none;cursor:pointer;transition:all .15s;min-height:36px}
  .yt-btn:active{transform:scale(.95);opacity:.9}
  .yt-btn:hover{background:#ef4444}
  /* Phase nav tabs */
  .phase-tabs{display:flex;justify-content:center;gap:8px;padding:14px 8px 4px;flex-wrap:wrap}
  .phase-tab{padding:10px 18px;border-radius:8px;border:2px solid #333;background:transparent;color:#888;font-weight:800;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;min-height:44px}
  .phase-tab.active{color:#fff}
  /* Add time button */
  .btn-addtime{background:#f59e0b;color:#000;font-weight:900;padding:10px 20px;font-size:.85rem;box-shadow:0 0 15px rgba(245,158,11,.3)}

  @media(max-width:480px){
    .week-tab{padding:8px 11px;font-size:.72rem}
    .session-card{margin:10px 12px;padding:16px}
    .controls{gap:8px}
    .btn-primary{padding:14px 32px;font-size:.95rem}
    .phase-tab{padding:8px 12px;font-size:.68rem}
  }
  @media(min-width:768px){
    .session-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0 4px}
    .session-card{margin:10px 12px}
    .phase-tab{padding:10px 22px;font-size:.8rem}
  }
</style>
</head>
<body>
<div id="app"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useCallback=React.useCallback;

var PHASES=[
  {name:"FOUNDATION",weeks:[1,2],color:"#22d3ee",desc:"Build fundamentals & rhythm"},
  {name:"BUILD",weeks:[3,4],color:"#f59e0b",desc:"Power combinations & timing"},
  {name:"FLOW",weeks:[5,6],color:"#ef4444",desc:"Fluid chains & fight simulation"}
];

var PROGRAM={
  1:[
    {name:"Jab & Cross Basics",desc:"Master the 1-2 foundation. Focus on stance, hip rotation, and snap.",rounds:[
      {type:"warmup",name:"Shadow Warm-Up",duration:120,rest:90,notes:"Light bouncing, arm circles, shadow jabs. Get loose.",anim:"shadow"},
      {type:"round",name:"Jab Drill",duration:120,rest:90,notes:"Straight jab, full extension. Snap it back. Stay on the ball of your front foot.",anim:"jab"},
      {type:"round",name:"Cross Drill",duration:120,rest:90,notes:"Rotate the rear hip fully. Power comes from the ground up. Reset stance each time.",anim:"cross"},
      {type:"round",name:"1-2 Combo",duration:120,rest:90,notes:"Jab sets the range, cross delivers power. Keep your chin tucked.",anim:"jab-cross"},
      {type:"round",name:"1-2 Freestyle",duration:150,rest:90,notes:"Mix timing \u2014 double jabs, stutter step, then cross. Find your rhythm.",anim:"jab-cross"},
      {type:"cooldown",name:"Light Bag Work + Stretch",duration:120,rest:0,notes:"Gentle taps on the bag. Deep breathing. Stretch shoulders and hips.",anim:"stretch"}
    ]},
    {name:"Kick Introduction",desc:"Introduce the rear roundhouse. Build hip turnover and balance.",rounds:[
      {type:"warmup",name:"Dynamic Warm-Up",duration:120,rest:90,notes:"Leg swings, hip circles, light shadow kicks. Loosen the hips.",anim:"shadow"},
      {type:"round",name:"Rear Roundhouse \u2014 Slow",duration:120,rest:90,notes:"Turn on the ball of your lead foot. Shin connects to the bag. Slow and controlled.",anim:"kick"},
      {type:"round",name:"Rear Roundhouse \u2014 Power",duration:120,rest:90,notes:"Now add speed. Whip the hip through. Hands stay up protecting your face.",anim:"kick"},
      {type:"round",name:"Jab + Rear Kick",duration:120,rest:90,notes:"Jab to close distance, rear kick follows immediately. One-two rhythm.",anim:"jab-kick"},
      {type:"round",name:"Kick Combos",duration:150,rest:90,notes:"Alternate: jab-kick, cross-kick. Find which feels natural.",anim:"jab-kick"},
      {type:"cooldown",name:"Stretch & Reset",duration:120,rest:0,notes:"Quad stretch, hip flexor opener, calf stretch. Breathe deep.",anim:"stretch"}
    ]},
    {name:"Defense & Teep",desc:"Push kick fundamentals. Control distance like a Thai fighter.",rounds:[
      {type:"warmup",name:"Footwork Warm-Up",duration:120,rest:90,notes:"In-out movement, lateral slides. Stay on the balls of your feet.",anim:"shadow"},
      {type:"round",name:"Teep (Push Kick)",duration:120,rest:90,notes:"Drive the ball of your foot into the bag. Extend the hip, not just the knee.",anim:"teep"},
      {type:"round",name:"Teep + Step Back",duration:120,rest:90,notes:"Teep, then immediately step back out of range. Reset your stance.",anim:"teep"},
      {type:"round",name:"Jab-Cross-Teep",duration:120,rest:90,notes:"1-2 to close, teep to push away. This is range management.",anim:"jab-cross"},
      {type:"round",name:"Mixed Fundamentals",duration:150,rest:90,notes:"Freestyle: jab, cross, teep, kick. Use all your tools. Stay relaxed.",anim:"combo"},
      {type:"cooldown",name:"Cool Down",duration:120,rest:0,notes:"Light movement, deep stretching. Focus on hip openers.",anim:"stretch"}
    ]}
  ],
  2:[
    {name:"Hook & Low Kick",desc:"Add the lead hook and devastating low kick to your arsenal.",rounds:[
      {type:"warmup",name:"Shadow Boxing",duration:120,rest:90,notes:"Full shadow round \u2014 jab, cross, teep, kicks. Get the blood moving.",anim:"shadow"},
      {type:"round",name:"Lead Hook",duration:120,rest:90,notes:"Elbow at 90\u00B0, rotate from the hips. Short, tight arc. Don't wind up.",anim:"hook"},
      {type:"round",name:"Low Kick Drill",duration:120,rest:90,notes:"Target the lower third of the bag. Chop down at an angle. Turn over the hip.",anim:"lowkick"},
      {type:"round",name:"1-2-Hook",duration:120,rest:90,notes:"Jab-cross sets it up, hook finishes. The hook lands as the cross retracts.",anim:"combo"},
      {type:"round",name:"1-2 + Low Kick",duration:150,rest:90,notes:"Punch combo to the head, low kick to the legs. High-low combination.",anim:"jab-kick"},
      {type:"cooldown",name:"Active Recovery",duration:120,rest:0,notes:"Very light taps, breathing focus. Stretch everything.",anim:"stretch"}
    ]},
    {name:"Combination Builder",desc:"Chain techniques together. Start building fight-ready combos.",rounds:[
      {type:"warmup",name:"Combo Shadow",duration:120,rest:90,notes:"Shadow 1-2-hook, 1-2-kick. Visualize a target. Move your feet.",anim:"shadow"},
      {type:"round",name:"1-2-3 (Jab-Cross-Hook)",duration:120,rest:90,notes:"The classic three-punch combo. Snap each shot. Return to guard after the hook.",anim:"combo"},
      {type:"round",name:"1-2-Low Kick",duration:120,rest:90,notes:"Hands to body, kick to legs. High-low attack. Reset stance after the kick.",anim:"jab-kick"},
      {type:"round",name:"Jab-Rear Kick",duration:120,rest:90,notes:"Jab is the range-finder. Kick follows with full hip rotation.",anim:"jab-kick"},
      {type:"round",name:"Freestyle Combos",duration:180,rest:90,notes:"Mix everything you know. 3-4 strike combos. Move between combos.",anim:"combo"},
      {type:"cooldown",name:"Stretch & Breathe",duration:120,rest:0,notes:"Full body stretch. Focus on recovery breathing. You earned it.",anim:"stretch"}
    ]},
    {name:"Endurance Foundation",desc:"Push the pace. Build cardio while maintaining technique.",rounds:[
      {type:"warmup",name:"High-Tempo Shadow",duration:120,rest:90,notes:"Fast shadow boxing. Stay light on your feet. Keep hands up.",anim:"shadow"},
      {type:"round",name:"Jab Flurries",duration:90,rest:90,notes:"Rapid-fire jabs \u2014 10 in a row, reset, repeat. Speed over power.",anim:"jab"},
      {type:"round",name:"1-2 Burnout",duration:90,rest:90,notes:"Non-stop 1-2s. When you gas out, slow down but don't stop.",anim:"jab-cross"},
      {type:"round",name:"Kick Intervals",duration:90,rest:90,notes:"Alternate: 5 right kicks, 5 left kicks. Keep the pace honest.",anim:"kick"},
      {type:"round",name:"All-Out Combo",duration:120,rest:90,notes:"Any combo you want, maximum output. Leave it all on the bag.",anim:"combo"},
      {type:"round",name:"Teep + Move",duration:90,rest:90,notes:"Teep the bag, circle out. Teep again. Control the range under fatigue.",anim:"teep"},
      {type:"cooldown",name:"Recovery",duration:120,rest:0,notes:"Walk it off. Deep breathing. Stretch hip flexors and shoulders.",anim:"stretch"}
    ]}
  ],
  3:[
    {name:"Power Combinations",desc:"Load up the power shots. Rear hand, rear kick, commit to each strike.",rounds:[
      {type:"warmup",name:"Power Shadow",duration:120,rest:90,notes:"Slow, heavy shadow shots. Feel each one. Exhale sharply on strikes.",anim:"shadow"},
      {type:"round",name:"Heavy Cross",duration:120,rest:90,notes:"Sit down on the cross. Full hip rotation. Drive through the bag.",anim:"cross"},
      {type:"round",name:"Power Kick",duration:120,rest:90,notes:"Step into each kick. Turn the hip over completely. Swing through the bag.",anim:"kick"},
      {type:"round",name:"1-2-Low Kick (Power)",duration:120,rest:90,notes:"Every shot at 80% power. Jab snaps, cross cracks, low kick chops.",anim:"jab-kick"},
      {type:"round",name:"Hook-Cross-Hook",duration:150,rest:90,notes:"3-2-3 combination. Rotate fully on each hook. Power from the core.",anim:"combo"},
      {type:"cooldown",name:"Shake Out & Stretch",duration:120,rest:0,notes:"Shake your arms loose. Deep stretches. Recovery is part of training.",anim:"stretch"}
    ]},
    {name:"Knee & Clinch Work",desc:"Introduce devastating knees. Close-range warfare.",rounds:[
      {type:"warmup",name:"Clinch Shadow",duration:120,rest:90,notes:"Shadow clinch entries. Swim your hands to collar tie position.",anim:"shadow"},
      {type:"round",name:"Straight Knee",duration:120,rest:90,notes:"Drive the knee straight up. Hips forward. Pull the bag toward you as you knee.",anim:"knee"},
      {type:"round",name:"Curved Knee",duration:120,rest:90,notes:"Knee strikes from the side. Open the hip. Target the midsection of the bag.",anim:"knee"},
      {type:"round",name:"1-2 to Knee",duration:120,rest:90,notes:"Close distance with punches, grab the bag (clinch), drive knees.",anim:"knee"},
      {type:"round",name:"Knee Flurries",duration:150,rest:90,notes:"Alternating knees \u2014 left, right, left, right. Don't let the bag rest.",anim:"knee"},
      {type:"cooldown",name:"Hip Stretch & Recovery",duration:120,rest:0,notes:"Deep hip and groin stretches. Knees demand hip mobility.",anim:"stretch"}
    ]},
    {name:"Timing & Angles",desc:"Attack from different angles. Set traps with timing changes.",rounds:[
      {type:"warmup",name:"Angle Shadow",duration:120,rest:90,notes:"Shadow box while stepping off at angles. Never stay in one spot.",anim:"shadow"},
      {type:"round",name:"Jab-Step-Cross",duration:120,rest:90,notes:"Jab, step to the outside angle, cross from the new position.",anim:"jab-cross"},
      {type:"round",name:"Switch Kick",duration:120,rest:90,notes:"Switch stance quickly, kick off the new rear leg. Speed and deception.",anim:"kick"},
      {type:"round",name:"1-2, Angle, Hook",duration:120,rest:90,notes:"Straight shots, pivot 45\u00B0, throw the hook from the new angle.",anim:"combo"},
      {type:"round",name:"Delayed Power Shot",duration:150,rest:90,notes:"Feint with light shots, pause... then CRACK with a power shot. Break their timing.",anim:"cross"},
      {type:"cooldown",name:"Movement Cool Down",duration:120,rest:0,notes:"Light footwork, easy breathing. Let the heart rate come down gradually.",anim:"stretch"}
    ]}
  ],
  4:[
    {name:"Long Combinations",desc:"5-6 strike chains. Keep the pressure on. Overwhelm the bag.",rounds:[
      {type:"warmup",name:"Flow Shadow",duration:120,rest:90,notes:"Long flowing shadow combos. Don't think, just move. 5+ strikes per burst.",anim:"shadow"},
      {type:"round",name:"1-2-3-Low Kick",duration:120,rest:90,notes:"Jab-cross-hook upstairs, low kick to finish. Four weapons, one flow.",anim:"combo"},
      {type:"round",name:"1-2-Knee-Elbow Sim",duration:120,rest:90,notes:"Punches to close, knee in clinch range, simulate elbow with a hook.",anim:"knee"},
      {type:"round",name:"Kick-Punch-Kick",duration:120,rest:90,notes:"Lead with a kick, punch combo in the middle, end with another kick.",anim:"jab-kick"},
      {type:"round",name:"6-Count Freestyle",duration:180,rest:90,notes:"Every combo must be 6 strikes. Mix punches, kicks, knees. Be creative.",anim:"combo"},
      {type:"cooldown",name:"Controlled Cool Down",duration:120,rest:0,notes:"Very light work. Focus on breathing. Full stretch routine.",anim:"stretch"}
    ]},
    {name:"Pressure Fighter",desc:"Walk the bag down. Constant forward pressure with strikes.",rounds:[
      {type:"warmup",name:"Aggressive Shadow",duration:120,rest:90,notes:"Shadow with forward pressure. Every combo moves you forward.",anim:"shadow"},
      {type:"round",name:"Marching 1-2s",duration:120,rest:90,notes:"Step forward with each 1-2. Push the bag back. Don't let it settle.",anim:"jab-cross"},
      {type:"round",name:"Body-Head-Body",duration:120,rest:90,notes:"Hook to the body, cross upstairs, hook to the body again. Level changes.",anim:"hook"},
      {type:"round",name:"Pressure Kicks",duration:120,rest:90,notes:"Kick, step forward, kick again. Maintain forward movement after each kick.",anim:"kick"},
      {type:"round",name:"Volume Round",duration:180,rest:90,notes:"Maximum output. Every technique you know, maximum volume.",anim:"combo"},
      {type:"cooldown",name:"Wind Down",duration:120,rest:0,notes:"Slow, easy movement. Recover your breathing. Long stretches.",anim:"stretch"}
    ]},
    {name:"Counter Fighter",desc:"Wait, read, explode. Counter-attacking mindset.",rounds:[
      {type:"warmup",name:"Reactive Shadow",duration:120,rest:90,notes:"Imagine attacks coming. Slip, then counter. Build the defensive reflex.",anim:"shadow"},
      {type:"round",name:"Catch & Counter",duration:120,rest:90,notes:"Let the bag swing toward you, block/parry, counter with a cross or hook.",anim:"cross"},
      {type:"round",name:"Check + Kick",duration:120,rest:90,notes:"Simulate checking a kick, immediately counter with your own kick.",anim:"kick"},
      {type:"round",name:"Slip-Cross-Hook",duration:120,rest:90,notes:"Slip to the outside, cross from the angle, follow with a hook.",anim:"combo"},
      {type:"round",name:"Counter Freestyle",duration:150,rest:90,notes:"Push the bag, let it come back, counter with any combo. Timing is everything.",anim:"combo"},
      {type:"cooldown",name:"Recovery Round",duration:120,rest:0,notes:"Easy breathing, gentle movement. Full-body stretch.",anim:"stretch"}
    ]}
  ],
  5:[
    {name:"Flow State \u2014 Hands",desc:"Let the hands flow. Non-stop boxing with Muay Thai flavor.",rounds:[
      {type:"warmup",name:"Boxing Shadow",duration:120,rest:90,notes:"Pure hands shadow boxing. Jabs, crosses, hooks, uppercut motions. Flow.",anim:"shadow"},
      {type:"round",name:"Non-Stop Hands",duration:150,rest:90,notes:"Don't stop punching. Vary power and speed but keep the hands moving.",anim:"jab-cross"},
      {type:"round",name:"3-Punch Chains",duration:150,rest:90,notes:"Any 3-punch combo, then move. New combo. Move again. Constant variety.",anim:"combo"},
      {type:"round",name:"Hands + Low Kick Exit",duration:150,rest:90,notes:"Punch combo, finish with a low kick, angle out. Every time.",anim:"jab-kick"},
      {type:"round",name:"Pressure Boxing",duration:180,rest:90,notes:"Walk forward, throw leather. Channel your inner Muay Maat (puncher).",anim:"combo"},
      {type:"cooldown",name:"Shadow & Stretch",duration:120,rest:0,notes:"Light shadow, then deep stretch. Wrists, forearms, shoulders.",anim:"stretch"}
    ]},
    {name:"Flow State \u2014 Kicks",desc:"Kick-dominant session. Build devastating kicking power and fluidity.",rounds:[
      {type:"warmup",name:"Kick Shadow",duration:120,rest:90,notes:"Shadow kicks only. Both sides. Teeps, roundhouse, low kicks.",anim:"shadow"},
      {type:"round",name:"Right Kick Series",duration:120,rest:90,notes:"Rear roundhouse: low, mid, high. 5 each level. Controlled power.",anim:"kick"},
      {type:"round",name:"Left Kick Series",duration:120,rest:90,notes:"Switch to southpaw or lead kick. Same drill: low, mid, high.",anim:"kick"},
      {type:"round",name:"Kick + Punch + Kick",duration:150,rest:90,notes:"Lead with a kick, punch in the middle, end with a kick. Kick sandwich.",anim:"jab-kick"},
      {type:"round",name:"Continuous Kicking",duration:180,rest:90,notes:"Alternating kicks \u2014 right, left, right, left. Don't stop.",anim:"kick"},
      {type:"cooldown",name:"Hip & Leg Recovery",duration:120,rest:0,notes:"Deep hip flexor stretches, hamstring, quads. Your legs need this.",anim:"stretch"}
    ]},
    {name:"Full Arsenal Flow",desc:"Everything together. Punches, kicks, knees, teeps. Be water.",rounds:[
      {type:"warmup",name:"Full Shadow",duration:120,rest:90,notes:"Shadow using every weapon \u2014 hands, kicks, knees, teeps. Move freely.",anim:"shadow"},
      {type:"round",name:"Weapons Roulette",duration:150,rest:90,notes:"10 jabs, 10 crosses, 10 hooks, 10 kicks, 10 knees, 10 teeps. Cycle through.",anim:"combo"},
      {type:"round",name:"5-Strike Minimum",duration:150,rest:90,notes:"Every combo must have at least 5 strikes using different techniques.",anim:"combo"},
      {type:"round",name:"Rhythm Round",duration:150,rest:90,notes:"Find a rhythm. Boom-boom-BOOM. Light-light-HEAVY. Make it musical.",anim:"combo"},
      {type:"round",name:"All-Out Flow",duration:180,rest:90,notes:"Everything, all out. No thinking, just fighting. Trust your training.",anim:"combo"},
      {type:"cooldown",name:"Meditation Cool Down",duration:120,rest:0,notes:"Stand still. Breathe. Reflect on how far you've come. Full stretch.",anim:"stretch"}
    ]}
  ],
  6:[
    {name:"Fight Simulation \u2014 Round 1",desc:"Simulate a real fight. Measured start, build intensity.",rounds:[
      {type:"warmup",name:"Fight Prep",duration:120,rest:90,notes:"Shadow box like you're about to fight. Visualization. Deep breaths.",anim:"shadow"},
      {type:"round",name:"Feeling Out",duration:120,rest:90,notes:"Light jabs, teeps. Measure your distance. Don't overcommit.",anim:"jab"},
      {type:"round",name:"Establishing Range",duration:120,rest:90,notes:"Start committing more. 1-2s, low kicks. Let them know you're there.",anim:"jab-cross"},
      {type:"round",name:"Building Pressure",duration:150,rest:90,notes:"Increase volume. Longer combos. More kicks. Take the center.",anim:"combo"},
      {type:"round",name:"Championship Round",duration:180,rest:90,notes:"This is it. Everything you have. Leave nothing in the tank.",anim:"combo"},
      {type:"cooldown",name:"Victory Lap",duration:120,rest:0,notes:"You survived. Light movement, deep breathing, full stretch. Champion.",anim:"stretch"}
    ]},
    {name:"Fight Simulation \u2014 Aggressive",desc:"Come forward all session. Muay Khao style.",rounds:[
      {type:"warmup",name:"War Shadow",duration:120,rest:90,notes:"Aggressive shadow. Forward pressure from the start. Mean face on.",anim:"shadow"},
      {type:"round",name:"Marching Combos",duration:150,rest:90,notes:"Step forward with every combo. 1-2-3, step. Hook-cross-kick, step.",anim:"combo"},
      {type:"round",name:"Clinch Knees",duration:120,rest:90,notes:"Grab the bag, drive knees. Alternating. This is your range now.",anim:"knee"},
      {type:"round",name:"Body Destruction",duration:150,rest:90,notes:"Target the body \u2014 hooks, knees, low kicks. Break them down.",anim:"hook"},
      {type:"round",name:"Final Push",duration:180,rest:90,notes:"Max aggression. Everything. Punches, kicks, knees. Be relentless.",anim:"combo"},
      {type:"cooldown",name:"Warrior's Rest",duration:120,rest:0,notes:"Breathe. You gave it everything. Stretch deep. Recovery starts now.",anim:"stretch"}
    ]},
    {name:"Final Exam \u2014 Complete Fighter",desc:"Your graduation session. Show everything you've learned.",rounds:[
      {type:"warmup",name:"The Warm-Up",duration:120,rest:90,notes:"Full shadow boxing warm-up. Every technique. This is your moment.",anim:"shadow"},
      {type:"round",name:"Fundamentals Check",duration:120,rest:90,notes:"Clean jab, cross, hook, teep, kick. Show perfect form.",anim:"jab-cross"},
      {type:"round",name:"Combination Mastery",duration:150,rest:90,notes:"Your best 5+ strike combinations. Show creativity and flow.",anim:"combo"},
      {type:"round",name:"Power Showcase",duration:120,rest:90,notes:"Your hardest shots. Cross, hook, kick, knee. Maximum impact.",anim:"cross"},
      {type:"round",name:"The Gauntlet",duration:180,rest:90,notes:"3 minutes. Everything. Maximum volume, maximum variety. Your final test.",anim:"combo"},
      {type:"cooldown",name:"Graduate",duration:120,rest:0,notes:"You did it. 6 weeks. You're a different fighter now. Respect the journey.",anim:"stretch"}
    ]}
  ]
};

var DRILL_REFERENCE=[
  {name:"Jab (1)",desc:"Lead hand straight punch. Snap from the shoulder, full extension. Return to guard fast.",yt:"https://www.youtube.com/results?search_query=muay+thai+jab+technique+tutorial"},
  {name:"Cross (2)",desc:"Rear hand straight punch. Rotate the rear hip and shoulder through. Power from the ground up.",yt:"https://www.youtube.com/results?search_query=muay+thai+cross+technique+tutorial"},
  {name:"Lead Hook (3)",desc:"Lead hand arcing punch. Elbow at ~90\u00B0. Rotate from hips. Short, tight arc.",yt:"https://www.youtube.com/results?search_query=muay+thai+lead+hook+technique+tutorial"},
  {name:"Rear Roundhouse",desc:"Step 45\u00B0, pivot on lead foot ball. Turn hip over completely. Shin is the weapon.",yt:"https://www.youtube.com/results?search_query=muay+thai+roundhouse+kick+technique+tutorial"},
  {name:"Low Kick",desc:"Same as roundhouse targeting the thigh. Angle down slightly. Chop like an axe.",yt:"https://www.youtube.com/results?search_query=muay+thai+low+kick+technique+tutorial"},
  {name:"Teep (Push Kick)",desc:"Lift knee high, extend hip to push ball of foot into target. Range control weapon.",yt:"https://www.youtube.com/results?search_query=muay+thai+teep+push+kick+technique+tutorial"},
  {name:"Straight Knee",desc:"Drive knee straight up, hips forward. Pull target toward the knee. Close-range devastation.",yt:"https://www.youtube.com/results?search_query=muay+thai+straight+knee+technique+tutorial"},
  {name:"Curved Knee",desc:"Knee from an angle. Open the hip. Targets body/ribs in clinch range.",yt:"https://www.youtube.com/results?search_query=muay+thai+curved+knee+technique+tutorial"},
  {name:"Switch Kick",desc:"Quick stance switch \u2014 rear steps forward, original lead kicks. Speed and deception.",yt:"https://www.youtube.com/results?search_query=muay+thai+switch+kick+technique+tutorial"},
  {name:"1-2 Combo",desc:"Jab-Cross. Bread and butter. Jab finds range, cross delivers power.",yt:"https://www.youtube.com/results?search_query=muay+thai+jab+cross+combo+tutorial"},
  {name:"1-2-3 Combo",desc:"Jab-Cross-Hook. The classic three-piece. Each strike sets up the next.",yt:"https://www.youtube.com/results?search_query=muay+thai+jab+cross+hook+combo+tutorial"},
  {name:"Jab-Kick",desc:"Jab to close distance, immediate rear kick. The jab hides the kick.",yt:"https://www.youtube.com/results?search_query=muay+thai+jab+kick+combo+tutorial"}
];

/* ---- AUDIO ---- */
function playBeep(f,d,t){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.type=t||"square";o.frequency.value=f||800;g.gain.value=0.3;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(d||.15));o.stop(c.currentTime+(d||.15)+.01)}catch(x){}}
function playRoundEnd(){playBeep(600,.3,"square");setTimeout(function(){playBeep(600,.3,"square")},350);setTimeout(function(){playBeep(900,.5,"square")},700)}
function playCountdown(){playBeep(500,.1,"sine")}
function playWarning(){playBeep(400,.25,"sawtooth");setTimeout(function(){playBeep(500,.25,"sawtooth")},300)}

function fmt(s){var m=Math.floor(s/60),sec=s%60;return m+":"+(sec<10?"0":"")+sec}
function totalDur(ses){return ses.rounds.reduce(function(t,r){return t+r.duration+r.rest},0)}
function phaseFor(w){return PHASES.find(function(p){return p.weeks.indexOf(w)!==-1})}
function roundNum(rounds,idx){var n=0;for(var i=0;i<=idx;i++)if(rounds[i].type==="round")n++;return n}
function workRounds(ses){return ses.rounds.filter(function(r){return r.type==="round"}).length}

/* ---- YouTube search helper ---- */
function ytSearchUrl(drillName){return "https://www.youtube.com/results?search_query=muay+thai+"+encodeURIComponent(drillName)+"+technique+tutorial"}

/* ---- MAIN APP ---- */
function App(){
  var s1=useState(1),activeWeek=s1[0],setActiveWeek=s1[1];
  var s2=useState(null),activeSes=s2[0],setActiveSes=s2[1];
  var s3=useState(false),running=s3[0],setRunning=s3[1];
  var s4=useState(0),rIdx=s4[0],setRIdx=s4[1];
  var s5=useState(0),timeLeft=s5[0],setTimeLeft=s5[1];
  var s6=useState(false),inRest=s6[0],setInRest=s6[1];
  var s7=useState(false),showRef=s7[0],setShowRef=s7[1];
  var s8=useState(false),done=s8[0],setDone=s8[1];
  var s9=useState(false),warned10=s9[0],setWarned10=s9[1];
  var iRef=useRef(null);
  var sessions=PROGRAM[activeWeek]||[];
  var phase=phaseFor(activeWeek);

  function startSes(ses){setActiveSes(ses);setRIdx(0);setTimeLeft(ses.rounds[0].duration);setInRest(false);setRunning(false);setDone(false);setWarned10(false)}

  var tick=useCallback(function(){
    setTimeLeft(function(p){
      if(p<=1)return 0;
      if(p<=4&&p>1)playCountdown();
      // 10-second warning
      if(p===11){playWarning();setWarned10(true)}
      if(p>11){setWarned10(false)}
      return p-1
    })
  },[]);

  useEffect(function(){
    if(timeLeft===0&&activeSes&&!done){
      setWarned10(false);
      var cr=activeSes.rounds[rIdx];
      if(!inRest){
        if(cr.rest>0){playRoundEnd();setInRest(true);setTimeLeft(cr.rest)}
        else{var ni=rIdx+1;if(ni<activeSes.rounds.length){playRoundEnd();setRIdx(ni);setInRest(false);setTimeLeft(activeSes.rounds[ni].duration)}else{playRoundEnd();setRunning(false);setDone(true)}}
      }else{
        var ni2=rIdx+1;if(ni2<activeSes.rounds.length){playBeep(1000,.2,"sine");setRIdx(ni2);setInRest(false);setTimeLeft(activeSes.rounds[ni2].duration)}else{playRoundEnd();setRunning(false);setDone(true)}
      }
    }
  },[timeLeft,activeSes,rIdx,inRest,done]);

  useEffect(function(){
    if(running){iRef.current=setInterval(tick,1000)}else{clearInterval(iRef.current)}
    return function(){clearInterval(iRef.current)}
  },[running,tick]);

  function addTime(){setTimeLeft(function(p){return p+30})}
  function toggle(){if(done)return;if(!running)playBeep(1000,.15,"sine");setRunning(!running)}
  function skip(){if(!activeSes)return;setWarned10(false);var ni=rIdx+1;if(ni<activeSes.rounds.length){setRIdx(ni);setTimeLeft(activeSes.rounds[ni].duration);setInRest(false)}else{setRunning(false);setDone(true);setTimeLeft(0)}}
  function reset(){if(activeSes){setRIdx(0);setTimeLeft(activeSes.rounds[0].duration);setInRest(false);setRunning(false);setDone(false);setWarned10(false)}}
  function back(){setActiveSes(null);setRunning(false);clearInterval(iRef.current)}

  function progress(){
    if(!activeSes)return 0;var total=totalDur(activeSes),elapsed=0;
    for(var i=0;i<rIdx;i++)elapsed+=activeSes.rounds[i].duration+activeSes.rounds[i].rest;
    var cr=activeSes.rounds[rIdx];
    if(inRest)elapsed+=cr.duration+(cr.rest-timeLeft);else elapsed+=cr.duration-timeLeft;
    return Math.min((elapsed/total)*100,100);
  }

  function drillRefBlock(){
    return e("div",{className:"ref-section"},
      e("button",{className:"ref-header",onClick:function(){setShowRef(!showRef)}},
        e("span",null,"Drill Reference Guide"),
        e("span",{className:"chevron"+(showRef?" open":"")},"\u25BE")
      ),
      showRef?e("div",null,DRILL_REFERENCE.map(function(d,i){
        return e("div",{key:i,className:"ref-item"},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}},
            e("div",{className:"ref-name"},d.name),
            d.yt?e("a",{className:"yt-btn",href:d.yt,target:"_blank",rel:"noopener noreferrer",style:{fontSize:".72rem",padding:"5px 10px"}},"\uD83C\uDFAC Tutorial"):null
          ),
          e("div",{className:"ref-desc"},d.desc)
        )
      })):null
    )
  }

  // SESSION VIEW
  if(activeSes){
    var cr=activeSes.rounds[rIdx];
    var label=inRest?"REST":cr.type==="warmup"?"WARM-UP":cr.type==="cooldown"?"COOLDOWN":"ROUND "+roundNum(activeSes.rounds,rIdx);
    var tc=inRest?"#f59e0b":done?"#22c55e":"#fff";
    var ts=inRest?"0 0 40px rgba(245,158,11,.4)":done?"0 0 40px rgba(34,197,94,.4)":"0 0 40px rgba(220,38,38,.3)";
    var lc=inRest?"#f59e0b":(phase?phase.color:"#dc2626");
    var pg="linear-gradient(90deg,"+(phase?phase.color:"#dc2626")+",#fff)";
    // Is timer in the last 10 seconds? (not rest, running)
    var isWarning=!inRest&&running&&timeLeft<=10&&timeLeft>0&&!done;
    // Big timer mode when running or paused but started
    var isBig=running||(rIdx>0||timeLeft!==cr.duration);
    var timerClasses="timer-area"+(isBig?" timer-big":"")+(isWarning?" timer-warning":"");

    return e("div",{style:{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(180deg,#0a0a0a 0%,#1a0a0a 50%,#0a0a0a 100%)"}},
      e("div",{className:"session-header"},
        e("button",{className:"back-btn",onClick:back},"\u2190 Back"),
        e("div",{className:"session-header-label"},"Week "+activeWeek+" \u00B7 "+activeSes.name)
      ),
      e("div",{className:"progress-bar"},e("div",{className:"progress-fill",style:{width:progress()+"%",background:pg}})),
      e("div",{className:timerClasses},
        done?e("div",null,e("div",{className:"complete-msg"},"Session Complete"),e("div",{className:"complete-icon"},"\u2713")):
        e("div",null,
          e("div",{className:"round-label",style:{color:lc}},label),
          !inRest?e("div",{className:"status-label"},cr.name):null,
          e("div",{className:"timer-display",style:{color:tc,textShadow:ts}},fmt(timeLeft)),
          // YouTube tutorial link during round
          !inRest&&cr.anim&&!done?e("div",{style:{textAlign:"center",margin:"10px 0"}},e("a",{className:"yt-btn",href:ytSearchUrl(cr.name),target:"_blank",rel:"noopener noreferrer"},"\uD83C\uDFAC Watch Tutorial")):null,
          !inRest&&cr.notes?e("div",{className:"timer-notes"},cr.notes):null,
          isWarning?e("div",{style:{marginTop:"8px",fontSize:".85rem",fontWeight:700,color:"#ef4444",letterSpacing:".1em",textTransform:"uppercase",animation:"warningPulse .5s ease-in-out infinite"}},"\u26A0 LAST 10 SECONDS"):null
        )
      ),
      e("div",{className:"controls"},
        !done?[
          e("button",{key:"r",className:"btn btn-secondary",onClick:reset},"Reset"),
          e("button",{key:"t",className:"btn btn-primary "+(running?"btn-pause":"btn-start"),onClick:toggle},running?"Pause":timeLeft===activeSes.rounds[0].duration&&rIdx===0?"Start":"Resume"),
          inRest?e("button",{key:"a",className:"btn btn-addtime",onClick:addTime},"+30s"):null,
          e("button",{key:"s",className:"btn btn-secondary",onClick:skip},"Skip \u2192")
        ]:e("button",{className:"btn btn-done",onClick:back},"Done")
      ),
      e("div",{className:"round-list"},
        e("div",{className:"round-list-title"},"Session Rounds"),
        activeSes.rounds.map(function(r,i){
          var isA=i===rIdx&&!done,isD=i<rIdx||done;
          var cls="round-item"+(isA?" active":isD?" done":" upcoming");
          var bc=isA?(inRest?"#f59e0b":"#dc2626"):"#1a1a1a";
          var bg=isA?(inRest?"rgba(245,158,11,.15)":"rgba(220,38,38,.15)"):"#111";
          var tc2="round-type "+(r.type==="warmup"?"warmup":r.type==="cooldown"?"cooldown":"work");
          var tl=r.type==="round"?"R"+roundNum(activeSes.rounds,i):r.type==="warmup"?"W/U":"C/D";
          return e("div",{key:i,className:cls,style:{background:bg,borderColor:bc}},
            e("div",{style:{display:"flex",alignItems:"center",flex:1}},
              e("span",{className:tc2},tl),
              e("div",null,
                e("div",{className:"round-name",style:{color:isA?"#fff":"#ccc"}},(isD?"\u2713 ":"")+r.name),
                isA&&!inRest&&r.notes?e("div",{className:"round-detail"},r.notes):null
              )
            ),
            e("div",{className:"round-time"},fmt(r.duration),r.rest>0?e("span",{className:"round-rest-badge"},"+"+r.rest+"s"):null)
          )
        })
      ),
      drillRefBlock(),
      e("div",{style:{height:"40px"}})
    )
  }

  // LIST VIEW
  return e("div",{style:{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(180deg,#0a0a0a 0%,#1a0a0a 50%,#0a0a0a 100%)"}},
    e("div",{className:"header"},
      e("h1",{className:"title"},"Heavy Bag Lab"),
      e("div",{className:"subtitle"},"6-Week Muay Thai Program")
    ),
    e("div",{className:"phase-tabs"},PHASES.map(function(p){
      var isAP=phase&&phase.name===p.name;
      return e("button",{key:p.name,className:"phase-tab"+(isAP?" active":""),style:{borderColor:isAP?p.color:"#333",background:isAP?p.color+"22":"transparent",color:isAP?"#fff":"#888"},onClick:function(){setActiveWeek(p.weeks[0])}},p.name)
    })),
    e("div",{className:"phase-label",style:{color:phase?phase.color:"#dc2626",borderBottomColor:(phase?phase.color:"#dc2626")+"33"}},
      (phase?phase.desc:"")
    ),
    e("div",{className:"week-tabs"},phase?phase.weeks.map(function(w){
      var wp=phaseFor(w),isA=activeWeek===w;
      return e("button",{key:w,className:"week-tab"+(isA?" active":""),style:{borderColor:isA?(wp?wp.color:"#dc2626"):"#333",background:isA?(wp?wp.color:"#dc2626")+"22":"transparent"},onClick:function(){setActiveWeek(w)}},"Week "+w)
    }):[]),
    e("div",{className:"session-cards-grid"},sessions.map(function(s,i){
      return e("div",{key:i,className:"session-card",style:{borderLeftColor:phase?phase.color:"#dc2626"},onClick:function(){startSes(s)}},
        e("div",{className:"session-name"},s.name),
        e("div",{className:"session-desc"},s.desc),
        e("div",{className:"session-meta"},
          e("span",{className:"meta-badge"},workRounds(s)+" Rounds"),
          e("span",{className:"meta-badge"},Math.ceil(totalDur(s)/60)+" min"),
          e("span",{className:"meta-badge"},s.rounds.length+" segments")
        )
      )
    })),
    drillRefBlock(),
    e("div",{className:"footer"},"HEAVY BAG LAB \u00B7 MUAY THAI TRAINING SYSTEM")
  )
}

ReactDOM.render(e(App),document.getElementById("app"));
</script>
</body>
