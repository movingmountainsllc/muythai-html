<title>Heavy Bag Lab — Muay Thai Training</title>
<style>

  .round-detail{font-size:.72rem;color:#888;margin-top:2px}

  .ref-header{padding:14px 20px;background:#151515;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:#999;border:none;width:100%}

  .ref-name{font-weight:700;color:#dc2626;font-size:.9rem}
  .ref-desc{color:#888;font-size:.8rem;line-height:1.5;margin-top:4px}

  .session-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1a1a1a}

  .footer{text-align:center;padding:20px;font-size:.7rem;color:#333;letter-spacing:.1em}
  .chevron{font-size:1.2rem;transition:transform .2s;display:inline-block}

  @media(max-width:480px){
    .title{font-size:1.6rem}
    .timer-display{font-size:4.5rem}
    .week-tab{padding:6px 12px;font-size:.75rem}
  }
</style>
</head>

};

const DRILL_REFERENCE = [
  {name:"Jab (1)",desc:"Lead hand straight punch. Snap from the shoulder, full extension. Return to guard fast. The most important strike in combat sports."},
  {name:"Cross (2)",desc:"Rear hand straight punch. Rotate the rear hip and shoulder through. Power comes from the ground up through the kinetic chain."},
  {name:"Lead Hook (3)",desc:"Lead hand arcing punch. Elbow stays at ~90\u00B0. Rotate from the hips, not the arm. Short, tight arc for speed and power."},
  {name:"Rear Roundhouse Kick",desc:"Step at 45\u00B0, pivot on the ball of your lead foot. Turn the hip over completely. Shin is the weapon. Swing through the target."},
  {name:"Low Kick",desc:"Same mechanics as the roundhouse but targeting the thigh. Angle down slightly. Chop into the target like an axe."},
  {name:"Teep (Push Kick)",desc:"Lift the knee high, then extend the hip to push the ball of the foot into the target. A weapon for range control, not just power."},
  {name:"Straight Knee",desc:"Drive the knee straight up while pushing the hips forward. Pull your opponent (or bag) toward the knee. Close-range devastation."},
  {name:"Curved Knee",desc:"Knee strike from an angle. Open the hip to bring the knee in from the side. Targets the body/ribs in clinch range."},
  {name:"Switch Kick",desc:"Quick stance switch \u2014 rear foot steps forward, original lead foot kicks. Used for speed and deception."},
  {name:"1-2 Combo",desc:"Jab-Cross. The bread and butter of striking. Jab finds the range, cross delivers the power."},
  {name:"1-2-3 Combo",desc:"Jab-Cross-Hook. The classic three-piece. Each strike sets up the next through natural rotation."},
  {name:"Jab-Kick",desc:"Jab to close distance and occupy their hands, immediate rear kick. The jab hides the kick."},
];

// ─── AUDIO ──────────────────────────────────────────────────────────
function playBeep(freq, dur, type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || "square";
    osc.frequency.value = freq || 800;
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (dur || 0.15));
    osc.stop(ctx.currentTime + (dur || 0.15) + 0.01);
  } catch(ex){}
}
function playRoundEnd() {
  playBeep(600, 0.3, "square");
  setTimeout(function(){playBeep(600, 0.3, "square")}, 350);
  setTimeout(function(){playBeep(900, 0.5, "square")}, 700);
}
function playCountdown() { playBeep(500, 0.1, "sine"); }

function formatTime(s) {
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}
function getTotalDuration(session) {
  return session.rounds.reduce(function(t, r){ return t + r.duration + r.rest; }, 0);
}
function getPhaseForWeek(w) {
  return PHASES.find(function(p){ return p.weeks.indexOf(w) !== -1; });
}
function getRoundNumber(rounds, idx) {
  var n = 0;
  for (var i = 0; i <= idx; i++) { if (rounds[i].type === "round") n++; }
  return n;
}
function totalWorkRounds(session) {
  return session.rounds.filter(function(r){ return r.type === "round"; }).length;
}

// ─── APP ────────────────────────────────────────────────────────────
function App() {
  var _activeWeek = useState(1);
  var activeWeek = _activeWeek[0], setActiveWeek = _activeWeek[1];
  var _activeSession = useState(null);
  var activeSession = _activeSession[0], setActiveSession = _activeSession[1];
  var _timerRunning = useState(false);
  var timerRunning = _timerRunning[0], setTimerRunning = _timerRunning[1];
  var _currentRoundIdx = useState(0);
  var currentRoundIdx = _currentRoundIdx[0], setCurrentRoundIdx = _currentRoundIdx[1];
  var _timeLeft = useState(0);
  var timeLeft = _timeLeft[0], setTimeLeft = _timeLeft[1];
  var _inRest = useState(false);
  var inRest = _inRest[0], setInRest = _inRest[1];
  var _showRef = useState(false);
  var showRef = _showRef[0], setShowRef = _showRef[1];
  var _sessionComplete = useState(false);
  var sessionComplete = _sessionComplete[0], setSessionComplete = _sessionComplete[1];
  var intervalRef = useRef(null);

  var sessions = PROGRAM[activeWeek] || [];
  var phase = getPhaseForWeek(activeWeek);

  function startSession(session) {
    setActiveSession(session);
    setCurrentRoundIdx(0);
    setTimeLeft(session.rounds[0].duration);
    setInRest(false);
    setTimerRunning(false);
    setSessionComplete(false);
  }

  var tick = useCallback(function() {
    setTimeLeft(function(prev) {
      if (prev <= 1) {
        // Use refs to get current state
        return 0; // handled in effect
      }
      if (prev <= 4 && prev > 1) playCountdown();
      return prev - 1;
    });
  }, []);

  // Handle round transitions
  useEffect(function() {
    if (timeLeft === 0 && activeSession && !sessionComplete) {
      var currentRound = activeSession.rounds[currentRoundIdx];
      if (!inRest) {
        if (currentRound.rest > 0) {
          playRoundEnd();
          setInRest(true);
          setTimeLeft(currentRound.rest);
        } else {
          var nextIdx = currentRoundIdx + 1;
          if (nextIdx < activeSession.rounds.length) {
            playRoundEnd();
            setCurrentRoundIdx(nextIdx);
            setInRest(false);
            setTimeLeft(activeSession.rounds[nextIdx].duration);
          } else {
            playRoundEnd();
            setTimerRunning(false);
            setSessionComplete(true);
          }
        }
      } else {
        var nextIdx2 = currentRoundIdx + 1;
        if (nextIdx2 < activeSession.rounds.length) {
          playBeep(1000, 0.2, "sine");
          setCurrentRoundIdx(nextIdx2);
          setInRest(false);
          setTimeLeft(activeSession.rounds[nextIdx2].duration);
        } else {
          playRoundEnd();
          setTimerRunning(false);
          setSessionComplete(true);
        }
      }
    }
  }, [timeLeft, activeSession, currentRoundIdx, inRest, sessionComplete]);

  useEffect(function() {
    if (timerRunning) {
      intervalRef.current = setInterval(tick, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return function(){ clearInterval(intervalRef.current); };
  }, [timerRunning, tick]);

  function toggleTimer() {
    if (sessionComplete) return;
    if (!timerRunning) playBeep(1000, 0.15, "sine");
    setTimerRunning(!timerRunning);
  }
  function skipRound() {
    if (!activeSession) return;
    var nextIdx = currentRoundIdx + 1;
    if (nextIdx < activeSession.rounds.length) {
      setCurrentRoundIdx(nextIdx);
      setTimeLeft(activeSession.rounds[nextIdx].duration);
      setInRest(false);
    } else {
      setTimerRunning(false);
      setSessionComplete(true);
      setTimeLeft(0);
    }
  }
  function resetSession() {
    if (activeSession) {
      setCurrentRoundIdx(0);
      setTimeLeft(activeSession.rounds[0].duration);
      setInRest(false);
      setTimerRunning(false);
      setSessionComplete(false);
    }
  }
  function goBack() {
    setActiveSession(null);
    setTimerRunning(false);
    clearInterval(intervalRef.current);
  }
  function getProgress() {
    if (!activeSession) return 0;
    var total = getTotalDuration(activeSession);
    var elapsed = 0;
    for (var i = 0; i < currentRoundIdx; i++) {
      elapsed += activeSession.rounds[i].duration + activeSession.rounds[i].rest;
    }
    var cr = activeSession.rounds[currentRoundIdx];
    if (inRest) {
      elapsed += cr.duration + (cr.rest - timeLeft);
    } else {
      elapsed += cr.duration - timeLeft;
    }
    return Math.min((elapsed / total) * 100, 100);
  }

  // ─── DRILL REFERENCE COMPONENT ─────────────────────────────────
  function drillRef() {
    return e("div", {className:"ref-section"},
      e("button", {className:"ref-header", onClick:function(){setShowRef(!showRef)}},
        e("span", null, "Drill Reference Guide"),
        e("span", {className:"chevron" + (showRef ? " open" : "")}, "\u25BE")
      ),
      showRef ? e("div", null,
        DRILL_REFERENCE.map(function(d, i) {
          return e("div", {key:i, className:"ref-item"},
            e("div", {className:"ref-name"}, d.name),
            e("div", {className:"ref-desc"}, d.desc)
          );
        })
      ) : null
    );
  }

  // ─── SESSION VIEW ─────────────────────────────────────────────
  if (activeSession) {
    var currentRound = activeSession.rounds[currentRoundIdx];
    var label = inRest ? "REST"
      : currentRound.type === "warmup" ? "WARM-UP"
      : currentRound.type === "cooldown" ? "COOLDOWN"
      : "ROUND " + getRoundNumber(activeSession.rounds, currentRoundIdx);

    var timerColor = inRest ? "#f59e0b" : sessionComplete ? "#22c55e" : "#fff";
    var timerShadow = inRest ? "0 0 40px rgba(245,158,11,.4)"
      : sessionComplete ? "0 0 40px rgba(34,197,94,.4)"
      : "0 0 40px rgba(220,38,38,.3)";
    var labelColor = inRest ? "#f59e0b" : (phase ? phase.color : "#dc2626");
    var progressGrad = "linear-gradient(90deg, " + (phase ? phase.color : "#dc2626") + ", #fff)";

    return e("div", {style:{minHeight:"100vh",background:"linear-gradient(180deg,#0a0a0a 0%,#1a0a0a 50%,#0a0a0a 100%)"}},
      // Header bar
      e("div", {className:"session-header"},
        e("button", {className:"back-btn", onClick:goBack}, "\u2190 Back"),
        e("div", {className:"session-header-label"}, "Week " + activeWeek + " \u00B7 " + activeSession.name)
      ),
      // Progress
      e("div", {className:"progress-bar"},
        e("div", {className:"progress-fill", style:{width:getProgress()+"%", background:progressGrad}})
      ),
      // Timer
      e("div", {className:"timer-area"},
        sessionComplete ?
          e("div", null,
            e("div", {className:"complete-msg"}, "Session Complete"),
            e("div", {className:"complete-icon"}, "\u2713")
          )
        :
          e("div", null,
            e("div", {className:"round-label", style:{color:labelColor}}, label),
            !inRest ? e("div", {className:"status-label"}, currentRound.name) : null,
            e("div", {className:"timer-display", style:{color:timerColor, textShadow:timerShadow}}, formatTime(timeLeft)),
            !inRest && currentRound.notes ? e("div", {className:"timer-notes"}, currentRound.notes) : null
          )
      ),
      // Controls
      e("div", {className:"controls"},
        !sessionComplete ?
          [
            e("button", {key:"reset", className:"btn btn-secondary", onClick:resetSession}, "Reset"),
            e("button", {key:"toggle", className:"btn btn-primary " + (timerRunning ? "btn-pause" : "btn-start"), onClick:toggleTimer},
              timerRunning ? "Pause" : (timeLeft === activeSession.rounds[0].duration && currentRoundIdx === 0 ? "Start" : "Resume")),
            e("button", {key:"skip", className:"btn btn-secondary", onClick:skipRound}, "Skip \u2192"),
          ]
        :
          e("button", {className:"btn btn-done", onClick:goBack}, "Done")
      ),
      // Round list
      e("div", {className:"round-list"},
        e("div", {className:"round-list-title"}, "Session Rounds"),
        activeSession.rounds.map(function(r, i) {
          var isActive = i === currentRoundIdx && !sessionComplete;
          var isDone = i < currentRoundIdx || sessionComplete;
          var cls = "round-item" + (isActive ? " active" : isDone ? " done" : " upcoming");
          var borderColor = isActive ? (inRest ? "#f59e0b" : "#dc2626") : "#1a1a1a";
          var bgColor = isActive ? (inRest ? "rgba(245,158,11,.15)" : "rgba(220,38,38,.15)") : "#111";
          var typeClass = "round-type " + (r.type === "warmup" ? "warmup" : r.type === "cooldown" ? "cooldown" : "work");
          var typeLabel = r.type === "round" ? "R" + getRoundNumber(activeSession.rounds, i)
            : r.type === "warmup" ? "W/U" : "C/D";

          return e("div", {key:i, className:cls, style:{background:bgColor, borderColor:borderColor}},
            e("div", {style:{display:"flex",alignItems:"center",flex:1}},
              e("span", {className:typeClass}, typeLabel),
              e("div", null,
                e("div", {className:"round-name", style:{color:isActive?"#fff":"#ccc"}}, (isDone?"\u2713 ":"") + r.name),
                isActive && !inRest && r.notes ? e("div", {className:"round-detail"}, r.notes) : null
              )
            ),
            e("div", {className:"round-time"},
              formatTime(r.duration),
              r.rest > 0 ? e("span", {className:"round-rest-badge"}, "+" + r.rest + "s") : null
            )
          );
        })
      ),
      // Drill reference
      drillRef(),
      e("div", {style:{height:"40px"}})
    );
  }

  // ─── SESSION LIST VIEW ────────────────────────────────────────
  return e("div", {style:{minHeight:"100vh",background:"linear-gradient(180deg,#0a0a0a 0%,#1a0a0a 50%,#0a0a0a 100%)"}},
    // Header
    e("div", {className:"header"},
      e("h1", {className:"title"}, "Heavy Bag Lab"),
      e("div", {className:"subtitle"}, "6-Week Muay Thai Program")
    ),
    // Phase
    e("div", {className:"phase-label", style:{color:phase?phase.color:"#dc2626", borderBottomColor:(phase?phase.color:"#dc2626")+"33"}},
      "Phase: " + (phase?phase.name:"") + " \u2014 " + (phase?phase.desc:"")
    ),
    // Week tabs
    e("div", {className:"week-tabs"},
      [1,2,3,4,5,6].map(function(w) {
        var wp = getPhaseForWeek(w);
        var isActive = activeWeek === w;
        return e("button", {
          key:w,
          className:"week-tab" + (isActive?" active":""),
          style:{
            borderColor: isActive ? (wp?wp.color:"#dc2626") : "#333",
            background: isActive ? (wp?wp.color:"#dc2626") + "22" : "transparent",
          },
          onClick:function(){setActiveWeek(w)}
        }, "Week " + w);
      })
    ),
    // Session cards
    e("div", null,
      sessions.map(function(s, i) {
        return e("div", {
          key:i,
          className:"session-card",
          style:{borderLeftColor: phase?phase.color:"#dc2626"},
          onClick:function(){startSession(s)}
        },
          e("div", {className:"session-name"}, s.name),
          e("div", {className:"session-desc"}, s.desc),
          e("div", {className:"session-meta"},
            e("span", {className:"meta-badge"}, totalWorkRounds(s) + " Rounds"),
            e("span", {className:"meta-badge"}, Math.ceil(getTotalDuration(s)/60) + " min"),
            e("span", {className:"meta-badge"}, s.rounds.length + " segments")
          )
        );
      })
    ),
    // Drill reference
    drillRef(),
    e("div", {className:"footer"}, "HEAVY BAG LAB \u00B7 MUAY THAI TRAINING SYSTEM")
  );
}

ReactDOM.render(e(App), document.getElementById("app"));
</script>
</body>
</html>
